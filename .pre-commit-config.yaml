repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-format
        files: ^src/
      - id: ruff
        args: [--fix]
        files: ^src/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - typer>=0.9
          - rich>=13.0
          - pydantic>=2.0
